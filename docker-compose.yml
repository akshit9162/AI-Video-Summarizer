services:

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./outputs:/app/outputs
      - ./uploads:/app/uploads
      - ./.cache:/app/.cache
      - ./checkpoints:/app/checkpoints
    depends_on:
      - redis
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./outputs:/app/outputs
      - ./uploads:/app/uploads
      - ./.cache:/app/.cache
      - ./checkpoints:/app/checkpoints
    depends_on:
      - redis
    command: celery -A celery_app worker --loglevel=info --pool=solo --concurrency=1

  streamlit:
    build: .
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./outputs:/app/outputs
      - ./.cache:/app/.cache
    depends_on:
      - api
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  redis_data:
